<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} - 他晓</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --blue-primary: #1976D2;
    --blue-dark: #1565C0;
    --blue-mid: #2196F3;
    --blue-light: #64B5F6;
    --blue-pale: #BBDEFB;
    --blue-bg: #E3F2FD;
    --blue-white: #F5F9FF;
    --white: #FFFFFF;
    --gray-50: #FAFBFC;
    --gray-100: #F0F2F5;
    --gray-200: #E4E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-800: #1F2937;
    --text-primary: #1A2332;
    --text-secondary: #4A5568;
    --text-muted: #718096;
    --border: #E2E8F0;
    --shadow-sm: 0 1px 3px rgba(25, 118, 210, 0.06);
    --shadow-md: 0 4px 16px rgba(25, 118, 210, 0.08);
    --shadow-lg: 0 8px 32px rgba(25, 118, 210, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--gray-50);
    color: var(--text-primary);
    line-height: 1.9;
  }

  .wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px;
  }

  .header {
    text-align: center;
    padding: 0 0 28px;
    background: var(--white);
    border-radius: 0 0 16px 16px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 4px;
    overflow: hidden;
  }

  .header-deco {
    width: 100%;
    max-width: 100%;
    margin-left: 0;
    margin-right: 0;
    border-radius: 0;
    margin-bottom: 22px;
    display: block;
  }

  .brand-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .brand-avatar {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(25, 118, 210, 0.15);
  }

  .brand-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--blue-primary);
    letter-spacing: 2px;
  }

  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--text-primary);
    line-height: 1.4;
    margin-bottom: 10px;
    padding: 0 8px;
  }

  .header h1 .accent {
    color: var(--blue-primary);
  }

  .header-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.5px;
    padding: 0 16px;
  }

  .content-area { padding: 0; }
  .section { margin-bottom: 32px; }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 16px;
    padding-left: 14px;
    border-left: 3px solid var(--blue-primary);
  }

  .content-text {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 2;
    margin-bottom: 14px;
    text-align: justify;
  }

  .content-text strong {
    color: var(--blue-dark);
    font-weight: 600;
  }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 16px 0;
  }

  .clean-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    box-shadow: var(--shadow-sm);
  }

  .clean-card .cc-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--blue-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 12px;
  }

  .clean-card .cc-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px; font-weight: 600;
    color: var(--text-primary); margin-bottom: 6px;
  }

  .clean-card .cc-desc {
    font-size: 12px; color: var(--text-muted); line-height: 1.7;
  }

  .callout {
    background: var(--blue-bg);
    border-left: 4px solid var(--blue-primary);
    border-radius: 0 12px 12px 0;
    padding: 20px 18px;
    margin: 18px 0;
  }

  .callout .callout-label {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    color: var(--blue-primary);
    background: var(--white);
    padding: 2px 10px; border-radius: 8px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
  }

  .callout p {
    font-size: 14px; color: var(--text-secondary); line-height: 2;
  }

  .summary-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 22px;
    margin: 28px 0;
    text-align: center;
    box-shadow: var(--shadow-md);
  }

  .summary-box .summary-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px; font-weight: 700;
    color: var(--text-primary); margin-bottom: 14px;
  }

  .summary-box .summary-text {
    font-size: 14px; color: var(--text-secondary); line-height: 2;
  }

  .summary-box .summary-text strong { color: var(--blue-primary); }

  @media (max-width: 480px) {
    .header h1 { font-size: 22px; }
    .card-grid { grid-template-columns: 1fr; }
    .qr-pair { flex-direction: column !important; }
    .qr-pair .qr-separator { display: none !important; }
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- ===== ARTICLE HEADER ===== -->
  <div class="header">
    <img class="header-deco" src="assets/header_deco.png" alt="header decoration" />
    <div class="brand-row">
      <img class="brand-avatar" src="assets/avatar.png" alt="他晓" />
      <span class="brand-name">他晓</span>
    </div>
    <h1>{{TITLE}}</h1>
    <p class="header-subtitle">{{SUBTITLE}}</p>
  </div>

  <!-- ===== ARTICLE CONTENT START ===== -->
  <div class="content-area">

    <!-- 在此下方放置文章正文内容 -->

  <!-- ===== ARTICLE CONTENT END ===== -->
  </div>

  <!-- ===== ARTICLE FOOTER ===== -->
  <div class="footer" style="text-align:center; padding:20px 0 44px; background:var(--white); border-radius:16px 16px 0 0; box-shadow:0 -2px 12px rgba(0,0,0,0.04); margin-top:4px; overflow:hidden;">
    <img src="assets/footer_deco.png" alt="footer decoration" style="width:100%; max-width:100%; margin-left:0; margin-right:0; border-radius:0; margin-bottom:24px; opacity:0.5; display:block;" />

    <!-- 社群邀请 -->
    <div style="margin:0 auto 24px; max-width:480px; background:linear-gradient(135deg,#E3F2FD 0%,#F3E5F5 100%); border-radius:16px; padding:24px 20px; border:1px solid rgba(25,118,210,0.1); box-shadow:0 2px 12px rgba(25,118,210,0.06);">
      <div style="font-family:'Noto Serif SC',serif; font-size:16px; font-weight:700; color:#1976D2; margin-bottom:8px; text-align:center;">💬 加入「他晓」交流社群</div>
      <div style="font-size:13px; color:#4A5568; line-height:1.9; text-align:center; margin-bottom:16px;">
        和志同道合的朋友一起<br/>探讨 AI、技术与成长的无限可能 ✨
      </div>
      <div style="background:#FFFFFF; border-radius:12px; padding:14px 16px; border:1px solid #E2E8F0; box-shadow:0 1px 4px rgba(0,0,0,0.04);">
        <div style="font-size:13px; color:#4A5568; line-height:1.8; text-align:center;">
          <div style="font-weight:600; color:#1976D2; margin-bottom:12px;">添加微信：扫描下方二维码</div>
          <img src="assets/qrcode_wechat.png" alt="微信二维码" style="display:block; width:100px; height:100px; border-radius:10px; margin:0 auto 12px;" />
          <span style="display:inline-block; background:#E3F2FD; color:#1565C0; font-size:12px; font-weight:600; padding:2px 12px; border-radius:8px; letter-spacing:0.5px;">备注「他晓」邀请进群</span>
        </div>
      </div>
    </div>

    <!-- 双二维码并排 -->
    <div class="qr-pair" style="display:flex; align-items:flex-start; justify-content:center; gap:0; margin-bottom:20px;">
      <!-- 公众号二维码 -->
      <div style="flex:1; max-width:220px; text-align:center; padding:0 8px;">
        <div style="background:var(--white); border:1px solid var(--border); border-radius:14px; padding:16px 12px; box-shadow:var(--shadow-sm);">
          <img src="assets/qrcode_gzh.jpg" alt="公众号二维码" style="width:120px; height:120px; border-radius:10px; margin-bottom:10px;" />
          <div style="font-family:'Noto Serif SC',serif; font-size:14px; font-weight:600; color:var(--blue-primary); margin-bottom:4px;">公众号 · 他晓</div>
          <div style="font-size:11px; color:var(--text-muted);">关注获取更多内容</div>
        </div>
      </div>

      <!-- 分隔线 -->
      <div class="qr-separator" style="width:1px; height:160px; background:linear-gradient(to bottom, transparent, var(--blue-pale), transparent); margin:0 4px; flex-shrink:0;"></div>

      <!-- 小程序二维码 -->
      <div style="flex:1; max-width:220px; text-align:center; padding:0 8px;">
        <div style="background:var(--white); border:1px solid var(--border); border-radius:14px; padding:16px 12px; box-shadow:var(--shadow-sm);">
          <img src="assets/qrcode_xcx.jpg" alt="小程序二维码" style="width:120px; height:120px; border-radius:10px; margin-bottom:10px;" />
          <div style="font-family:'Noto Serif SC',serif; font-size:14px; font-weight:600; color:var(--blue-primary); margin-bottom:4px;">小程序 · 人格派对</div>
          <div style="font-size:11px; color:var(--text-muted);">开启你的探索之旅</div>
        </div>
      </div>
    </div>

    <p style="font-size:12px; color:var(--text-muted); letter-spacing:0.5px;">长按识别二维码关注</p>
    <p style="font-size:11px; color:var(--gray-400); margin-top:14px;">© 2026 他晓 · All Rights Reserved</p>
  </div>

</div>

</body>
</html>
